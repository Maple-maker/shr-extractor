<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHR Extractor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 40px; max-width: 520px; width: 100%; }
    h1 { color: #e94560; font-size: 1.6rem; margin-bottom: 6px; }
    .subtitle { color: #a0a0b0; font-size: 0.9rem; margin-bottom: 28px; }
    .drop-zone { border: 2px dashed #0f3460; border-radius: 6px; padding: 40px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 20px; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #e94560; }
    .drop-zone p { color: #a0a0b0; margin-top: 8px; font-size: 0.9rem; }
    .drop-zone .icon { font-size: 2.5rem; }
    input[type="file"] { display: none; }
    .filename { color: #e0e0e0; font-size: 0.9rem; margin-top: 8px; }
    .btn { background: #e94560; color: white; border: none; padding: 12px 28px; border-radius: 5px; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 4px; }
    .btn:hover { background: #c73652; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .error { background: #3a1a1a; border: 1px solid #e94560; color: #ff6b6b; padding: 12px; border-radius: 5px; margin-bottom: 16px; font-size: 0.9rem; }
    .info { color: #a0a0b0; font-size: 0.8rem; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SHR Extractor</h1>
    <p class="subtitle">Upload a Sub Hand Receipt PDF — extracts LIN, NSN, serial numbers, and OH quantities.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/extract" enctype="multipart/form-data" id="uploadForm">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('pdfInput').click()">
        <div class="icon">📄</div>
        <p>Drop SHR PDF here or click to browse</p>
        <div class="filename" id="filename"></div>
      </div>
      <input type="file" id="pdfInput" name="pdf" accept=".pdf" onchange="showFilename(this)">
      <button type="submit" class="btn" id="submitBtn" disabled>Extract Property Data</button>
    </form>

    <p class="info">Data never leaves this server. Output available as CSV or JSON.</p>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const input = document.getElementById('pdfInput');
    const btn = document.getElementById('submitBtn');
    const fname = document.getElementById('filename');

    function showFilename(input) {
      if (input.files.length) {
        fname.textContent = input.files[0].name;
        btn.disabled = false;
      }
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length && files[0].name.endsWith('.pdf')) {
        const dt = new DataTransfer();
        dt.items.add(files[0]);
        input.files = dt.files;
        showFilename(input);
      }
    });
  </script>
</body>
</html>
